<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trakking — BCO Importer + Terminal Operator</title>
<style>

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:17px;background:#F1F5F9;color:#1E293B;min-height:100vh}

/* ── Top bar ── */
.topbar{background:#0D1B2A;padding:11px 22px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid #29ABE2;position:sticky;top:0;z-index:100}
.tlogo{display:flex;align-items:center;gap:10px}
.tlogo-box{width:30px;height:30px;background:#29ABE2;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#0D1B2A}
.tlogo-name{font-size:17px;font-weight:700;color:#fff}
.tlogo-sub{font-size:13px;color:#94A3B8;margin-top:1px}
.live-badge{display:flex;align-items:center;gap:6px;font-size:13px;color:#94A3B8}
.live-dot{width:7px;height:7px;border-radius:50%;background:#22C55E;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ── Page nav ── */











/* ── Page header banner ── */
.page-header{padding:16px 22px 10px;border-bottom:1px solid #E2E8F0;background:#fff;margin-bottom:0}
.ph-row{display:flex;align-items:center;gap:12px}
.ph-icon{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;flex-shrink:0}
.ph-title{font-size:18px;font-weight:700;color:#0F172A}
.ph-sub{font-size:12px;color:#64748B;margin-top:2px}

/* ── Body ── */
.body{padding:18px 22px}
.cols2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.cols3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

/* ── Stats ── */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.stat{background:#fff;border-radius:10px;padding:13px 15px;border-left:4px solid #29ABE2;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.stat.g{border-left-color:#16A34A}.stat.a{border-left-color:#D97706}.stat.r{border-left-color:#DC2626}.stat.p{border-left-color:#7C3AED}
.slbl{font-size:12px;color:#64748B;text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px;font-weight:600}
.sval{font-size:26px;font-weight:700;color:#0F172A}
.ssub{font-size:12px;color:#64748B;margin-top:2px}

/* ── Cards ── */
.card{background:#fff;border-radius:10px;border:1px solid #E2E8F0;overflow:hidden;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card-head{padding:10px 16px;border-bottom:1px solid #F1F5F9;display:flex;align-items:center;justify-content:space-between;background:#F8FAFC}
.ch{font-size:14px;font-weight:700;color:#334155;letter-spacing:.3px;text-transform:uppercase}
.badge{font-size:12px;padding:2px 8px;border-radius:8px;font-weight:700}
.bc{background:#DBEAFE;color:#1D4ED8}.bg{background:#DCFCE7;color:#15803D}
.ba{background:#FEF9C3;color:#92400E}.br{background:#FEE2E2;color:#B91C1C}
.bw{background:#F1F5F9;color:#475569}.bp{background:#EDE9FE;color:#6D28D9}

/* ── Rows ── */
.row{padding:10px 16px;border-bottom:1px solid #F1F5F9;display:flex;align-items:center;gap:12px}
.row:last-child{border-bottom:none}
.row-info{flex:1;min-width:0}
.row-id{font-size:15px;font-weight:700;color:#0F172A}
.row-detail{font-size:13px;color:#64748B;margin-top:2px}
.row-time{font-size:14px;font-weight:700;color:#0369A1;min-width:46px;flex-shrink:0}

/* ── Terminal badges ── */
.at-dp{font-size:12px;padding:2px 8px;border-radius:5px;font-weight:700;background:#DBEAFE;color:#1D4ED8;flex-shrink:0}
.at-gct{font-size:12px;padding:2px 8px;border-radius:5px;font-weight:700;background:#DCFCE7;color:#15803D;flex-shrink:0}

/* ── Priority pills ── */
.pill{font-size:12px;padding:2px 8px;border-radius:8px;font-weight:700;flex-shrink:0}
.pill-double{font-size:12px;background:#DCFCE7;color:#15803D}
.pill-normal{font-size:12px;background:#F1F5F9;color:#64748B}
.pill-export{font-size:12px;background:#EDE9FE;color:#6D28D9}
.pill-open{font-size:12px;background:#DCFCE7;color:#15803D}
.pill-taken{font-size:12px;background:#F1F5F9;color:#94A3B8}
.pill-avail{background:#DCFCE7;color:#15803D;font-size:12px;padding:2px 8px;border-radius:8px;font-weight:700}
.pill-wait{background:#FEF9C3;color:#92400E;font-size:12px;padding:2px 8px;border-radius:8px;font-weight:700}

/* ── Buttons ── */
.btn-claim{padding:7px 16px;background:#16A34A;border:none;border-radius:6px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .15s;flex-shrink:0}
.btn-claim:hover{opacity:.85}
.btn-claimed{padding:6px 14px;background:#F1F5F9;border:1px solid #CBD5E1;border-radius:6px;color:#94A3B8;font-size:11px;cursor:default;font-family:inherit;flex-shrink:0}
.btn-primary{padding:10px 20px;background:#0369A1;border:none;border-radius:7px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-primary:hover{opacity:.88}
.btn-outline{padding:8px 16px;background:transparent;border:1.5px solid #CBD5E1;border-radius:7px;color:#475569;font-size:13px;cursor:pointer;font-family:inherit}
.btn-exp{padding:7px 16px;background:#7C3AED;border:none;border-radius:6px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0}
.btn-exp:hover{opacity:.85}

/* ── Banners ── */
.banner{margin:12px;border-radius:8px;padding:11px 14px;display:flex;align-items:flex-start;gap:10px}
.banner.green{background:#F0FDF4;border:1.5px solid #86EFAC}
.banner.blue{background:#EFF6FF;border:1.5px solid #93C5FD}
.banner.purple{background:#F5F3FF;border:1.5px solid #C4B5FD}
.banner.amber{background:#FFFBEB;border:1.5px solid #FDE68A}
.bn-icon{width:30px;height:30px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;margin-top:1px}
.bn-title{font-size:15px;font-weight:700;margin-bottom:2px}
.bn-text{font-size:13px;line-height:1.55}
.banner.green .bn-title{color:#14532D}.banner.green .bn-text{color:#166534}
.banner.blue  .bn-title{color:#1E3A8A}.banner.blue  .bn-text{color:#1E40AF}
.banner.purple .bn-title{color:#4C1D95}.banner.purple .bn-text{color:#5B21B6}
.banner.amber  .bn-title{color:#78350F}.banner.amber  .bn-text{color:#92400E}

/* ── Forms ── */
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:13px;color:#475569;font-weight:700}
.fg input,.fg select,.fg textarea{background:#fff;border:1.5px solid #CBD5E1;border-radius:7px;padding:10px 12px;font-size:15px;color:#1E293B;font-family:inherit;transition:border-color .15s;width:100%}
.fg input:focus,.fg select:focus{outline:none;border-color:#29ABE2}
.fg .hint{font-size:12px;color:#94A3B8}
.form-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-pad{padding:14px}

/* ── Upload ── */
.upload-zone{border:2px dashed #CBD5E1;border-radius:10px;padding:26px;text-align:center;cursor:pointer;transition:all .15s;background:#F8FAFC}
.upload-zone:hover{border-color:#29ABE2;background:#EFF6FF}
.upload-zone.drag{border-color:#29ABE2;background:#EFF6FF}
.uz-icon{font-size:30px;margin-bottom:8px}
.uz-title{font-size:15px;font-weight:700;color:#334155;margin-bottom:4px}
.uz-sub{font-size:13px;color:#64748B}
.uz-btn{margin-top:10px;padding:8px 20px;background:#fff;border:1.5px solid #CBD5E1;border-radius:6px;color:#475569;font-size:13px;cursor:pointer;font-family:inherit;font-weight:600}
.preview-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:10px}
.preview-table th{text-align:left;padding:8px 10px;font-size:12px;color:#64748B;text-transform:uppercase;letter-spacing:.4px;border-bottom:1.5px solid #E2E8F0;font-weight:700;background:#F8FAFC}
.preview-table td{padding:8px 10px;border-bottom:1px solid #F1F5F9;color:#1E293B}
.preview-table tr.ok td:first-child::before{content:"✓ ";color:#16A34A;font-weight:700}
.preview-table tr.err td{color:#DC2626}
.preview-table tr.err td:first-child::before{content:"✗ ";color:#DC2626;font-weight:700}
.upload-progress{background:#E2E8F0;border-radius:3px;height:5px;margin:8px 0;overflow:hidden}
.upload-progress-fill{height:5px;background:#29ABE2;border-radius:3px;transition:width .4s ease}

/* ── GPS panel ── */
.gps-card{margin-bottom:14px;border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.gps-head{padding:11px 16px;display:flex;align-items:center;justify-content:space-between}
.gps-toggle{display:flex;align-items:center;gap:10px}
.toggle-track{width:44px;height:24px;border-radius:12px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.toggle-thumb{width:18px;height:18px;border-radius:50%;background:#fff;position:absolute;top:3px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.25)}

/* ── Geofence bars ── */
.geo-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px 14px}
.geo-card{border-radius:8px;padding:11px;border:1.5px solid #E2E8F0}
.geo-name{font-size:12px;font-weight:700;color:#0F172A;margin-bottom:6px}
.geo-bar-bg{background:#E2E8F0;border-radius:3px;height:5px;margin-bottom:4px;overflow:hidden}
.geo-bar-fill{height:5px;border-radius:3px;transition:width .6s ease}
.geo-status{font-size:10px}

/* ── Section label ── */
.section-lbl{font-size:12px;color:#64748B;text-transform:uppercase;letter-spacing:.6px;padding:8px 14px 4px;border-top:1px solid #F1F5F9;font-weight:700;background:#F8FAFC}

/* ── Util bar ── */
.util-bar{padding:10px 14px;border-bottom:1px solid #F1F5F9}
.util-inner{background:#E2E8F0;border-radius:3px;height:7px;overflow:hidden;margin-bottom:5px}
.util-fill{height:7px;border-radius:3px;transition:width .6s}

/* ── Search bar ── */
.search-bar{padding:10px 14px;display:flex;gap:8px;border-bottom:1px solid #F1F5F9;flex-wrap:wrap;background:#F8FAFC}
.search-bar select{background:#fff;border:1px solid #CBD5E1;border-radius:7px;padding:6px 10px;font-size:12px;color:#334155;font-family:inherit;flex:1}
.search-bar button{padding:8px 18px;background:#0369A1;border:none;border-radius:7px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}

/* ── Confirmed move steps ── */
.move-steps{padding:10px 14px;font-size:13px;line-height:1.9;color:#64748B}
.move-steps .step-label{color:#94A3B8;margin-right:4px}
.move-steps .step-val{color:#0F172A;font-weight:600}
.move-steps .step-saving{color:#15803D;font-weight:700}

/* ── Empty / toast ── */
.empty-state{padding:24px;text-align:center;font-size:15px;color:#94A3B8}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#15803D;color:#fff;padding:12px 24px;border-radius:9px;font-size:14px;font-weight:700;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.2)}
.toast.show{opacity:1}


/* ── Dynamic pricing ── */
.price-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:8px;font-size:12px;font-weight:700;flex-shrink:0}
.price-green{background:#DCFCE7;color:#15803D}
.price-amber{background:#FEF9C3;color:#92400E}
.price-blue{background:#DBEAFE;color:#1D4ED8}
.price-range-bar{height:8px;border-radius:4px;background:#E2E8F0;position:relative;margin:6px 0}
.price-range-fill{height:8px;border-radius:4px;position:absolute;left:0}
.price-range-dot{width:14px;height:14px;border-radius:50%;position:absolute;top:-3px;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.pricing-card{background:#FFFBEB;border:1.5px solid #FDE68A;border-radius:9px;padding:13px 15px;margin-bottom:10px}
.pricing-card.active{background:#F0FDF4;border-color:#86EFAC}
.price-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.price-label{font-size:12px;color:#64748B;font-weight:600}
.price-val{font-size:15px;font-weight:700}
.price-hint{font-size:11px;color:#94A3B8;margin-top:2px}
.dynamic-tag{font-size:10px;padding:2px 7px;border-radius:6px;background:#FEF9C3;color:#92400E;font-weight:700;margin-left:6px}

/* ── Pricing accordion ── */
.ctr-row{border-bottom:1px solid #F1F5F9;transition:background .12s;cursor:pointer}
.ctr-row:hover{background:#F8FAFC}
.ctr-row:last-child{border-bottom:none}
.ctr-summary{padding:11px 16px;display:flex;align-items:center;gap:12px}
.ctr-chevron{width:20px;height:20px;border-radius:50%;background:#F1F5F9;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .2s,background .15s;font-size:11px;color:#64748B}
.ctr-row.open .ctr-chevron{transform:rotate(180deg);background:#DBEAFE;color:#1D4ED8}
.price-expand{display:none;padding:0 16px 14px;border-top:1px solid #F1F5F9}
.ctr-row.open .price-expand{display:block}
.price-ticker{display:flex;align-items:baseline;gap:6px;margin-bottom:12px}
.price-current-big{font-size:32px;font-weight:700;color:#0369A1;line-height:1}
.price-currency{font-size:16px;color:#64748B;font-weight:500}
.price-mode-tag{font-size:11px;padding:3px 9px;border-radius:6px;font-weight:700;margin-left:4px}
.price-three{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.price-box{border-radius:8px;padding:10px 12px;text-align:center}
.price-box-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.price-box-val{font-size:20px;font-weight:700}
.price-track-wrap{position:relative;margin:4px 0 6px}
.price-track{height:8px;border-radius:4px;background:linear-gradient(to right,#FCA5A5,#FDE68A,#86EFAC);width:100%}
.price-dot{width:18px;height:18px;border-radius:50%;background:#0369A1;border:3px solid #fff;box-shadow:0 1px 5px rgba(0,0,0,.25);position:absolute;top:-5px;transition:left .4s ease}
.price-track-labels{display:flex;justify-content:space-between;font-size:10px;color:#94A3B8;margin-top:4px}
.price-note{font-size:11px;color:#64748B;background:#F8FAFC;border-radius:6px;padding:8px 10px;margin-top:6px;line-height:1.5}

/* ── Hide native arrows on suggested price only ── */
#imp-price-suggested::-webkit-outer-spin-button,
#imp-price-suggested::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
#imp-price-suggested{-moz-appearance:textfield}

/* ── Price stepper ── */
.stepper-wrap{display:flex;align-items:center;border:1.5px solid #FDE68A;border-radius:7px;overflow:hidden;background:#fff}
.stepper-btn{width:36px;height:40px;background:#FFFBEB;border:none;cursor:pointer;font-size:18px;font-weight:700;color:#92400E;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .12s;font-family:inherit;user-select:none}
.stepper-btn:hover{background:#FDE68A}
.stepper-btn:active{background:#FCA5A5}
.stepper-input{flex:1;border:none;outline:none;text-align:center;font-size:16px;font-weight:700;color:#92400E;background:#fff;padding:0;height:40px;font-family:inherit;min-width:0}
</style>
</head>
<body>
<div class="topbar">
  <div class="tlogo">
    <div class="tlogo-box">T</div>
    <div>
      <div class="tlogo-name">Trakking <span style="color:#29ABE2;font-size:12px;font-weight:400">· Double-Ended Moves</span></div>
      <div class="tlogo-sub">Inner Harbour · DP World Centerm Centerm &amp; GCT Vanterm</div>
    </div>
  </div>
  <div class="live-badge"><div class="live-dot"></div>Live · Vancouver Inner Harbour</div>
</div>
<div id="page-content"></div>
<div id="global-toast" class="toast"></div>
<script>

// ── Data ──────────────────────────────────────────────────────────────────
const TERMS = {
  DP:  { name:'DP World Centerm', short:'DP World Centerm' },
  GCT: { name:'GCT Vanterm',      short:'GCT Vanterm' }
};
const LINES     = ['Yang Ming','Evergreen','ZIM','Maersk'];
const COMPANIES = ['LTL Express','KTL','Fraser Valley Transport','Metro Container Lines','Harbour Link Trucking','Prudential Trucking'];
const WAREHOUSES= ['Canadian Tire – 11800 Voyageur Way','Hud Distribution – 7450 Hopcott Rd','Surrey Distribution – 18956 96 Ave','Burnaby DC – 4480 Still Creek Dr'];
const PFXS      = ['YMLU','EISU','ZIMU','MRKU','HLCU'];

function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function pick(a){return a[rnd(0,a.length-1)]}
function cid(){return pick(PFXS)+' '+rnd(1000000,9999999)}
function bl(){return 'BLYM'+rnd(100000,999999)}

let currentPage = 'importer';
let matchRate=62, co2Saved=54056, kmSaved=300320, confirmedMatches=0;

// GPS state
let gpsOn=false, nearTerminal=null, truckLat=49.2827, truckLng=-123.1207;

// Export reservations (truckers with a loaded drop-off booked)
let exportRes=[
  {id:'RES-001',container:cid(),company:'LTL Express',          terminal:'DP', line:'Yang Ming',time:'09:00',matched:null},
  {id:'RES-002',container:cid(),company:'KTL',  terminal:'GCT',line:'Evergreen', time:'09:30',matched:null},
  {id:'RES-003',container:cid(),company:'Harbour Link Trucking',    terminal:'DP', line:'ZIM',       time:'10:00',matched:null},
  {id:'RES-004',container:cid(),company:'Metro Container Lines',terminal:'GCT',line:'Maersk',    time:'10:30',matched:null},
  {id:'RES-005',container:cid(),company:'Fraser Valley Transport',terminal:'DP',line:'Yang Ming',time:'11:00',matched:null},
  {id:'RES-006',container:cid(),company:'Prudential Trucking',        terminal:'GCT',line:'Evergreen', time:'11:30',matched:null},
];

// Import containers pre-populated by BCO importers
let importCtrs=[
  {id:'IMP-001',container:cid(),bl:bl(),bco:'Canadian Tire',       terminal:'DP', line:'Yang Ming',deliverTo:WAREHOUSES[0],window:'09:00–12:00',weight:'22T',priceMin:225,priceSuggested:320,priceLikely:275,priceMode:'dynamic',currentPrice:275,status:'available',claimedBy:null},
  {id:'IMP-002',container:cid(),bl:bl(),bco:'TPCT Warehouse',      terminal:'GCT',line:'Evergreen', deliverTo:WAREHOUSES[1],window:'09:30–13:00',weight:'18T',priceMin:225,priceSuggested:300,priceLikely:255,priceMode:'dynamic',currentPrice:255,status:'available',claimedBy:null},
  {id:'IMP-003',container:cid(),bl:bl(),bco:'Canadian Tire',       terminal:'DP', line:'ZIM',       deliverTo:WAREHOUSES[0],window:'10:00–14:00',weight:'24T',priceMin:225,priceSuggested:350,priceLikely:325,priceMode:'fixed',currentPrice:325,status:'confirmed',claimedBy:'Harbour Link Trucking'},
  {id:'IMP-004',container:cid(),bl:bl(),bco:'K&N Warehouse',       terminal:'GCT',line:'Maersk',    deliverTo:WAREHOUSES[2],window:'10:30–15:00',weight:'20T',priceMin:225,priceSuggested:null,priceLikely:265,priceMode:'fixed',currentPrice:265,status:'available',claimedBy:null},
  {id:'IMP-005',container:cid(),bl:bl(),bco:'HUD Distribution',    terminal:'DP', line:'Yang Ming', deliverTo:WAREHOUSES[3],window:'11:00–14:00',weight:'19T',priceMin:225,priceSuggested:380,priceLikely:340,priceMode:'fixed',currentPrice:340,status:'confirmed',claimedBy:'Prudential Trucking'},
  {id:'IMP-006',container:cid(),bl:bl(),bco:'TPCT Warehouse',      terminal:'GCT',line:'Evergreen', deliverTo:WAREHOUSES[1],window:'11:30–16:00',weight:'21T',priceMin:225,priceSuggested:290,priceLikely:250,priceMode:'dynamic',currentPrice:250,status:'available',claimedBy:null},
];

// BCO exporter empty container requests
let exportReqs=[
  {id:'EXP-001',booking:'BKG-EXP-4421',bco:'Pacific Exports Inc.',  terminal:'DP', line:'Yang Ming',size:'40HC',window:'09:00–12:00',loadAddr:'Annacis Island – 1500 Derwent Way, Delta',status:'open',trucker:null},
  {id:'EXP-002',booking:'BKG-EXP-4438',bco:'Maple Ridge Exports',   terminal:'GCT',line:'Evergreen', size:'40GP',window:'10:00–14:00',loadAddr:'Richmond – 13888 Wireless Way',status:'open',trucker:null},
  {id:'EXP-003',booking:'BKG-EXP-4451',bco:'BC Lumber Co.',         terminal:'DP', line:'Maersk',    size:'20GP',window:'11:00–15:00',loadAddr:'Surrey – 19292 96th Ave',status:'open',trucker:null},
];

// ── Claim / assign ────────────────────────────────────────────────────────
function claimImport(impId, resId){
  const imp=importCtrs.find(c=>c.id===impId);
  const res=exportRes.find(r=>r.id===resId&&!r.matched);
  if(!imp||!res||imp.status!=='available') return;
  imp.status='claimed'; imp.claimedBy=res.company; res.matched=imp;
  matchRate=Math.min(matchRate+3,88);
  co2Saved+=rnd(180,280); kmSaved+=rnd(700,1200); confirmedMatches+=1;
  const cross=res.terminal!==imp.terminal;
  confirmedMoves.push({type:'import',trucker:res.company,expCtr:res.container,expTerm:res.terminal,impCtr:imp.container,impTerm:imp.terminal,bco:imp.bco,warehouse:imp.deliverTo,saving:rnd(185,295),time:res.time,cross});
  render();
  showToast('Double-ended match confirmed'+(cross?' · cross-terminal':'')+' · Priority gate issued');
}

function claimExport(expId){
  const exp=exportReqs.find(e=>e.id===expId&&e.status==='open');
  if(!exp) return;
  exp.status='assigned'; exp.trucker=pick(COMPANIES);
  matchRate=Math.min(matchRate+2,88);
  co2Saved+=rnd(120,200); kmSaved+=rnd(500,900); confirmedMatches+=1;
  confirmedMoves.push({type:'export',trucker:exp.trucker,bco:exp.bco,terminal:exp.terminal,line:exp.line,size:exp.size,loadAddr:exp.loadAddr,saving:rnd(140,220),time:exp.window.split('–')[0]});
  render();
  showToast('Empty container pickup confirmed for '+exp.bco+' · Trucker assigned');
}

function acceptAutoMatch(){
  const avail=importCtrs.filter(c=>c.status==='available'&&c.terminal===nearTerminal);
  const openE=exportReqs.filter(e=>e.status==='open'&&e.terminal===nearTerminal);
  const res=exportRes.find(r=>!r.matched);
  if(avail.length>0&&res) claimImport(avail[0].id,res.id);
  else if(openE.length>0) claimExport(openE[0].id);
  else { showToast('Match accepted · Priority gate confirmed'); confirmedMatches+=1; matchRate=Math.min(matchRate+2,88); }
  nearTerminal=null; render();
}
function dismissAlert(){ nearTerminal=null; render(); }

// ── GPS ───────────────────────────────────────────────────────────────────
function calcDist(la1,ln1,la2,ln2){
  const R=6371,dL=(la2-la1)*Math.PI/180,dN=(ln2-ln1)*Math.PI/180;
  const a=Math.sin(dL/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dN/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
const GF={DP:{lat:49.2879,lng:-123.0922,name:'DP World Centerm',r:1.2},GCT:{lat:49.2956,lng:-123.1040,name:'GCT Vanterm',r:1.2}};

function toggleGPS(){
  gpsOn=!gpsOn;
  if(!gpsOn){nearTerminal=null;}
  else{ setTimeout(()=>{ if(gpsOn&&!nearTerminal) simPos(49.2879,-123.0922,'DP'); },3000); }
  render();
}
function simPos(lat,lng,term){
  truckLat=lat; truckLng=lng; nearTerminal=term;
  if(term) showToast('Geofence entered · Auto-match alert sent to your device');
  render();
}

// ── PAGE 2: Truck Dispatcher ──────────────────────────────────────────────

  const importRows=avail.length===0

      return `<div class="row">
        <div class="row-info">
          <div class="row-id">${c.container} ${cross?'<span style="font-size:10px;padding:1px 7px;border-radius:6px;background:#DBEAFE;color:#1D4ED8;font-weight:700">Cross-terminal</span>':''}</div>

  const ctr=document.getElementById('imp-ctr')?.value.trim();
  const blNum=document.getElementById('imp-bl')?.value.trim();
  const term=document.getElementById('imp-term')?.value;
  const line=document.getElementById('imp-line')?.value;
  const from=document.getElementById('imp-from')?.value;
  const to=document.getElementById('imp-to')?.value;
  const addr=document.getElementById('imp-addr')?.value.trim();
  const wt=document.getElementById('imp-wt')?.value.trim()||'N/A';
  const priceMin=parseFloat(document.getElementById('imp-price-min')?.value)||null;
  const priceSuggested=parseFloat(document.getElementById('imp-price-suggested')?.value)||null;
  const priceLikely=parseFloat(document.getElementById('imp-price-likely')?.value)||null;
  const priceMode=document.getElementById('imp-price-mode')?.value||'dynamic';
  const errEl=document.getElementById('imp-err');
  if(!ctr||!blNum||!addr){
    errEl.innerHTML='<div style="font-size:13px;color:#DC2626;padding:6px 10px;background:#FEF2F2;border-radius:5px;border-left:3px solid #DC2626">Container number, B/L number, and delivery address are required.</div>';
    return;
  }
  errEl.innerHTML='';
  // Calculate current dynamic price
  const currentPrice = calcDynamicPrice(priceMin, priceSuggested, priceLikely, priceMode);
  importCtrs.push({id:'IMP-N'+importCtrs.length,container:ctr,bl:blNum,bco:'My Company',terminal:term,line,deliverTo:addr,window:from+'–'+to,weight:wt,status:'available',claimedBy:null,priceMin,priceSuggested,priceLikely,priceMode,currentPrice});
  showToast(ctr+' registered — delivery fee: $'+(currentPrice||'TBD'));
  render();
}

function calcDynamicPrice(min, suggested, likely, mode){
  if(!suggested && !likely && !min) return null;
  if(mode==='fixed') return suggested||likely||min;
  // Dynamic: weight toward likely, nudge based on availability
  const avail = importCtrs.filter(c=>c.status==='available').length;
  const urgencyFactor = avail <= 2 ? 1.08 : avail >= 5 ? 0.95 : 1.0;
  const base = likely || suggested || min;
  const raw = Math.round(base * urgencyFactor / 5) * 5;
  if(min && raw < min) return min;
  if(suggested && raw > suggested * 1.2) return Math.round(suggested * 1.2 / 5) * 5;
  return raw;
}

// ── Upload handlers ───────────────────────────────────────────────────────
function dragOver(e){e.preventDefault();document.getElementById('upload-zone')?.classList.add('drag')}
function dragLeave(){document.getElementById('upload-zone')?.classList.remove('drag')}
function dropFile(e){e.preventDefault();dragLeave();const f=e.dataTransfer.files[0];if(f)processUpload(f)}
function handleFile(input){if(input.files[0])processUpload(input.files[0])}

function processUpload(file){
  const zone=document.getElementById('upload-zone');
  const preview=document.getElementById('upload-preview');
  if(!zone||!preview) return;
  zone.innerHTML=`<div class="uz-icon">⏳</div><div class="uz-title">Processing ${file.name}…</div><div class="upload-progress"><div class="upload-progress-fill" id="uprog" style="width:0%"></div></div>`;
  let w=0;
  const iv=setInterval(()=>{
    w+=20;
    const el=document.getElementById('uprog');
    if(el) el.style.width=w+'%';
    if(w>=100){clearInterval(iv);showUploadResult(file,preview,zone);}
  },120);
}

function showUploadResult(file,preview,zone){
  const rows=[
    {ctr:'YMLU '+rnd(1000000,9999999),bl:'BLYM'+rnd(100000,999999),term:'DP World Centerm',line:'Yang Ming',addr:'Richmond DC',from:'09:00',to:'13:00',wt:'22T',ok:true},
    {ctr:'EISU '+rnd(1000000,9999999),bl:'BLYM'+rnd(100000,999999),term:'GCT Vanterm',line:'Evergreen',addr:'Delta Warehouse',from:'10:00',to:'14:00',wt:'18T',ok:true},
    {ctr:'MRKU '+rnd(1000000,9999999),bl:'BLYM'+rnd(100000,999999),term:'DP World Centerm',line:'Maersk',addr:'Surrey Distribution',from:'11:00',to:'15:00',wt:'20T',ok:true},
    {ctr:'INVALID',bl:'',term:'DP World Centerm',line:'ZIM',addr:'',from:'',to:'',wt:'',ok:false},
  ];
  zone.innerHTML=`<div class="uz-icon" style="color:#16A34A">✓</div><div class="uz-title" style="color:#16A34A">${file.name} parsed</div><div class="uz-sub">${rows.filter(r=>r.ok).length} valid · ${rows.filter(r=>!r.ok).length} error</div>`;
  const valid=rows.filter(r=>r.ok).length;
  preview.innerHTML=`<table class="preview-table">
    <thead><tr><th>Container</th><th>B/L</th><th>Terminal</th><th>Deliver to</th><th>Window</th></tr></thead>
    <tbody>${rows.map(r=>`<tr class="${r.ok?'ok':'err'}"><td>${r.ctr}</td><td>${r.bl||'<span style="color:#DC2626">Missing</span>'}</td><td>${r.term}</td><td>${r.addr||'<span style="color:#DC2626">Missing</span>'}</td><td>${r.from&&r.to?r.from+'–'+r.to:'<span style="color:#DC2626">Missing</span>'}</td></tr>`).join('')}</tbody>
  </table>
  <div style="display:flex;gap:8px;margin-top:10px">
    <button class="btn-primary" onclick="confirmBulk(${valid})">Import ${valid} valid containers</button>
    <button class="btn-outline" onclick="resetUpload()">Cancel</button>
  </div>`;
}

function confirmBulk(n){showToast(n+' containers imported successfully');resetUpload();render();}
function resetUpload(){
  const z=document.getElementById('upload-zone');
  if(z)z.innerHTML=`<div class="uz-icon">📋</div><div class="uz-title">Drag &amp; drop your Excel or CSV file</div><div class="uz-sub">Supported: .xlsx, .xls, .csv · Max 500 rows</div><button class="uz-btn" onclick="document.getElementById('file-input').click()">Browse files</button><input type="file" id="file-input" accept=".xlsx,.xls,.csv" style="display:none" onchange="handleFile(this)">`;
  const p=document.getElementById('upload-preview');
  if(p)p.innerHTML='';
}

function navTo(page, btn){

function toggleSuggestedPrice(mode){
  const wrap = document.getElementById('suggested-price-wrap');
  if(!wrap) return;
  wrap.style.display = mode === 'dynamic' ? 'flex' : 'none';
  wrap.style.flexDirection = 'column';
  wrap.style.gap = '4px';
}

function stepPrice(id, delta){
  const el = document.getElementById(id);
  if(!el) return;
  const current = parseFloat(el.value) || 0;
  const minVal = parseFloat(el.min) || 0;
  const next = Math.max(minVal, current + delta);
  el.value = next;
}

function togglePricing(idx){
  const row = document.getElementById('ctr-row-'+idx);
  if(row) row.classList.toggle('open');
}

    return `<div class="price-expand" style="background:#F0FDF4;border-top:2px solid #86EFAC">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">

        </div>

        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <div>
            <div style="font-size:11px;color:#15803D;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px">Agreed rate</div>
            <div style="font-size:22px;font-weight:700;color:#14532D">${cur} <span style="font-size:13px;font-weight:400;color:#15803D">/ container</span></div>
          </div>
          <div style="text-align:right">
            <div style="font-size:11px;color:#64748B;margin-bottom:3px">Original range</div>

    </div>

        <div class="price-box-lbl" style="color:#DC2626">Minimum</div>
